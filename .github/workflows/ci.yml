# =============================================================================
# Multi-Tenant AI Platform -- CI Pipeline
# =============================================================================
#
# Jobs:
#   lint          -- ruff + mypy  (every push -- commit gate)
#   unit-tests    -- pytest tests/unit/ (every push -- commit gate)
#   integration   -- pytest tests/integration/ tests/api/ (PR gate)
#   docker-build  -- docker build validation (PR gate)
#
# Push to any branch: lint + unit-tests run in parallel.
# Pull request:       all four jobs run; integration and docker-build
#                     require lint + unit-tests to pass first.
# =============================================================================

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  PYTHON_VERSION: "3.11"

# Cancel in-progress runs for the same branch on new push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # lint -- ruff + mypy
  # Runs on every push. Fails fast before any test execution.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt --quiet

      - name: ruff check
        run: ruff check .

      - name: mypy
        run: mypy app/ --ignore-missing-imports

  # ---------------------------------------------------------------------------
  # unit-tests -- pytest tests/unit/ only
  # Runs on every push. No external services required (all mocked).
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt --quiet
          pip install -r requirements-dev.txt --quiet

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v --tb=short
        env:
          APP_ENV: development
          LLM_API_KEY: changeme
          LLM_PROVIDER: local
          LLM_MODEL_NAME: local

  # ---------------------------------------------------------------------------
  # integration -- pytest tests/integration/ + tests/api/
  # Runs on pull requests only. Requires live ChromaDB and Redis.
  # ---------------------------------------------------------------------------
  integration:
    name: Integration & API Tests
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: github.event_name == 'pull_request'

    services:
      chromadb:
        image: chromadb/chroma:latest
        ports:
          - 8001:8000
        options: >-
          --health-cmd "curl -f http://localhost:8000/api/v1/heartbeat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt --quiet
          pip install -r requirements-dev.txt --quiet

      - name: Run integration and API tests
        run: python -m pytest tests/integration/ tests/api/ -v --tb=short
        env:
          APP_ENV: development
          CHROMA_HOST: localhost
          CHROMA_PORT: 8001
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          LLM_API_KEY: changeme
          LLM_PROVIDER: local
          LLM_MODEL_NAME: local

  # ---------------------------------------------------------------------------
  # docker-build -- validates Dockerfile builds without error
  # Runs on pull requests only. Does not push to any registry.
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ai-platform:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
